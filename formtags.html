<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Document</title>
</head>
<body style="background-color:beige">
<h1 style="text-align: center;"><u>Book Your Trip</u></h1> 
<form action="">
 <fieldset>
 <table cellpadding="8">
 <tr>
 <td><label for="">Name:</label></td>
 <td><input type="text" placeholder="Enter your full name"></td>
 </tr>
 <tr>
 <td><label for="">Password:</label></td>
<td><input type="password"></td>
 </tr>
 <tr>
 <td><label for="">Mobile No:</label></td>
 <td><input type="tel" maxlength="13"></td>
 </tr>
 <tr>
 <td><label for="">Email ID:</label></td>
 <td><input type="email" placeholder="abc@gmail.com"></td>
 </tr>
 <tr>
 <td><label for="">Date:</label></td>
 <td><input type="date"></td>
 </tr>
 <tr>
 <td><label for="">No. Of Travelers:</label></td>
 <td><input type="number"></td>
 </tr>
 <tr>
 <td><label for="">Choose Destination:</label></td>
 <td>
 <select name="Destination">
 <option value="Kolhapur">Kolhapur</option>
 <option value="Banglore">Banglore</option>
 <option value="Pune">Pune</option>
 <option value="Mumbai">Mumbai</option>
 <option value="Shimla">Shimla</option>
 <option value="Kashmir">Kashmir</option>
 </select>
 </td>
 </tr>
 <tr>
 <td><label for="Gender">Select Gender:</label></td>
 <td>
 <label for="Male">Male</label>
 <input type="radio" value="Male" name="Gender">
 <label for="Female">Female</label>
 <input type="radio" value="Female" name="Gender">
 </td>
 </tr>
 <tr>
 <td><label for="">Type of travel:</label></td>
 <td><input type="checkbox" value="Adventure">
 <label for="">Adventure</label>
 <input type="checkbox" name="" id="">
 <label for="">Historical</label>
 <input type="checkbox" name="" id="">
 <label for="">Spiritual</label>
 </td>
 </tr>
 <tr>
 <td><label for="">Upload ID proof</label></td>
 <td><input type="file" name="" id=""></td>
 </tr>
 <tr>
 <td><label for="">Additional Commets</label></td>
 <td>
 <textarea name="" placeholder="any special request?"
 rows="4" cols="30"></textarea>
 </td>
 </tr>
 </table>
</fieldset>
</form> <br>
<input type="submit" value="Submit"
style="background-color: rgb(231, 101, 101);color: white;">
<input type="Reset" value="CANCEL"
style="background-color: rgb(199, 185, 185);" >
<br>
<br>
<marquee style="background-color: rgb(149, 153, 153);">Thanks for Booking with 
us!!</marquee>
</body>
</html>
